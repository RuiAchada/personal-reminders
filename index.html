<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- 1. Custom Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍎</text></svg>" />
    
    <!-- 2. Better Viewport for mobile (prevents scaling issues) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <title>Pantry Tracker</title>

    <!-- 3. iOS PWA Essentials -->
    <!-- This removes the Safari URL bar and bottom nav -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    
    <!-- This makes the status bar translucent so your app colors can flow behind it -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- The name displayed on your Home Screen icon -->
    <meta name="apple-mobile-web-app-title" content="Pantry" />

    <!-- 4. The App Icon (iOS uses this for the home screen) -->
    <!-- Tip: Replace this URL with your own /icon.png in public folder later -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3724/3724720.png">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
